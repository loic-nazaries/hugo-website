######################## default configuration ####################
baseURL = "https://loic-nazaries.github.io/website/"
canonifyURLs = true

copyright = "Copyright &copy; 2020 a hugo theme by [somrat](https://somrat.netlify.com)"

defaultContentLanguage = "fr"
defaultContentLanguageInSubdir = true
disableDefaultLanguageRedirect = false

ignoreLogs = ['warning-goldmark-raw-html']

theme = "somrat"

[author]
  author = "Loïc Nazaries, PhD"

[params]
  subtitle = "Portfolio Website"
  favicon = "images/favicon.png"
  logo_dark = "images/logo-dark.png"
  logo_light = "images/logo.png"
  logo_width = "150px"
  [params.contact]
    email = "loicnazaries.datascience@gmail.com"
    phone = "+33 6 24 80 83 15"
  [params.preloader]
    enable = true 
    preloader = "images/preloader.gif" # use jpg, png, svg or gif format.

[languages]
  [languages.fr]
    contentDir = "content/french"
    direction = "ltr"
    disabled = false
    label = "Français"
    locale = "fr-FR"
    title = "Bienvenue chez Loïc's Data Science"
    weight = 1
  [languages.en]
    contentDir = "content/english"
    direction = "ltr"
    disabled = false
    label = "English"
    locale = "en-GB"
    title = "Welcome to Loïc's Data Science"
    weight = 2

[markup]
  [markup.goldmark.renderer]
      unsafe = true

[services]
  [services.googleAnalytics]
    id = ""
  [services.disqus]
    shortname = "" # get your shortname form here : https://disqus.com

[caches]
  [caches.images]
    dir = ':cacheDir/images'

